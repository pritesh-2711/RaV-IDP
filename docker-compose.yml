services:
  rav-idp:
    build: .
    # CLI workflow:
    #   - put PDFs under ./input
    #   - read/write benchmark datasets under ./data
    #   - collect outputs under ./artifacts
    volumes:
      - ./input:/workspace/input
      - ./data:/workspace/data
      - ./artifacts:/workspace/artifacts
    # Reads OPENAI_API_KEY and any other vars from ./experiment/.env.
    env_file:
      - .env
    # Keep stdin open so you can run an interactive shell.
    stdin_open: true
    tty: true
